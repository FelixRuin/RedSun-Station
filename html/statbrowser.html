<!DOCTYPE html>
<html>
<head>
<title>Stat Browser</title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
<meta http-equiv="Cache-Control" content="max-age=15; must-revalidate" />
<style>
:root {
	--bg-primary: #202020;
	--bg-secondary: #1a1a1a;
	--bg-tertiary: #2a2a2a;
	--bg-hover: #333333;
	--text-primary: #abc6ec;
	--text-secondary: #8a9bb5;
	--text-muted: #556070;
	--accent: #dc143c;
	--accent-hover: #e8354f;
	--health-good: #4ec94e;
	--health-warn: #cca700;
	--health-bad: #f44747;
	--border: rgba(255, 255, 255, 0.08);
	--font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Verdana, sans-serif;
	--font-mono: Consolas, "Courier New", monospace;
	--fav-bg: rgba(232, 168, 32, 0.15);
	--fav-border: rgba(232, 168, 32, 0.5);
	--fav-accent: #e8a820;
	--font-size: 12px;
	--border-radius: 4px;
}

body.light {
	--bg-primary: #ffffff;
	--bg-secondary: #f3f3f3;
	--bg-tertiary: #e8e8e8;
	--bg-hover: #e0e0e0;
	--text-primary: #1e1e1e;
	--text-secondary: #555555;
	--text-muted: #999999;
	--border: #d4d4d4;
}

* { box-sizing: border-box; }

body {
	font-family: var(--font-sans);
	font-size: var(--font-size);
	margin: 0;
	padding: 0;
	overflow-x: hidden;
	overflow-y: auto;
	background-color: var(--bg-primary);
	color: var(--text-primary);
}

::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: var(--bg-primary); }
::-webkit-scrollbar-thumb { background: var(--bg-tertiary); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--bg-hover); }

a { color: var(--accent); text-decoration: none; cursor: pointer; }
a:hover { text-decoration: underline; }

img { image-rendering: pixelated; }

/* Focus rings — keyboard-only via :focus-visible so mouse interactions stay clean.
   Player session can be 4+ hours; without this, keyboard users have zero feedback.
   The inner rule uses `outline-color` only so per-component CSS can still tweak the look. */
:focus { outline: none; }
*:focus-visible {
	outline: 2px solid var(--accent);
	outline-offset: 1px;
}

/* Respect prefers-reduced-motion — disable shuttle pulse and slow transitions for users
   who've asked the OS to ease up on motion (vestibular triggers, low-power modes). */
@media (prefers-reduced-motion: reduce) {
	* {
		animation-duration: 0.01ms !important;
		animation-iteration-count: 1 !important;
		transition-duration: 0.01ms !important;
		scroll-behavior: auto !important;
	}
}

/* ===== Tab Bar ===== */
#tab-bar {
	display: flex;
	flex-wrap: wrap;
	align-items: stretch;
	background: var(--bg-secondary);
	border-bottom: 1px solid var(--border);
	position: fixed;
	top: 0;
	left: 0;
	right: 0;
	z-index: 100;
	padding: 0 2px;
	min-height: 32px;
}

#tab-bar-spacer {
	flex-grow: 1;
	order: 9997;
}

.tab-btn {
	display: inline-flex;
	align-items: center;
	padding: var(--tab-padding-v, 6px) var(--tab-padding-h, 12px);
	font-size: 12px;
	font-family: var(--font-sans);
	color: var(--text-secondary);
	background: transparent;
	border: none;
	border-bottom: 2px solid transparent;
	cursor: pointer;
	white-space: nowrap;
	flex-shrink: 0;
	transition: color 80ms, border-color 80ms, background 80ms;
	outline: none;
}
.tab-btn:hover {
	color: var(--text-primary);
	background: var(--bg-hover);
}
.tab-btn.active {
	color: var(--text-primary);
	border-bottom-color: var(--accent);
}
.tab-btn.tab-fav.active {
	border-bottom-color: var(--fav-accent);
}

#tab-search-btn {
	flex-shrink: 0;
	order: 9998;
	padding: var(--tab-padding-v, 6px) 8px;
	background: transparent;
	border: none;
	cursor: pointer;
	color: var(--text-secondary);
	display: inline-flex;
	align-items: center;
}
#tab-search-btn:hover { color: var(--text-primary); }
#tab-search-btn svg { width: 14px; height: 14px; }

/* ===== Content Area ===== */
#spacer { height: 34px; }
#statcontent { padding: 0; }

/* ===== Search Overlay ===== */
#global-search-overlay {
	display: none;
	position: fixed;
	top: 34px;
	left: 0;
	right: 0;
	bottom: 0;
	background: rgba(0, 0, 0, 0.92);
	z-index: 200;
}
#global-search-overlay.visible { display: flex; flex-direction: column; }
#global-search-box {
	margin: 12px 12px 0 12px;
	padding: 8px 12px;
	font-size: 13px;
	font-family: var(--font-sans);
	background: var(--bg-secondary);
	border: 1px solid var(--accent);
	border-radius: 6px;
	color: var(--text-primary);
	outline: none;
}
#global-search-results {
	flex: 1;
	overflow-y: auto;
	padding: 8px 12px;
}
.search-cat-header {
	font-size: 11px;
	font-weight: bold;
	color: var(--text-secondary);
	text-transform: uppercase;
	letter-spacing: 0.5px;
	padding: 8px 0 4px 0;
	border-bottom: 1px solid var(--border);
	margin-bottom: 4px;
}
.search-result-item {
	display: inline-block;
	padding: 4px 10px;
	margin: 2px;
	border-radius: 4px;
	background: var(--bg-tertiary);
	color: var(--text-primary);
	cursor: pointer;
	font-size: 12px;
}
.search-result-item:hover { background: var(--accent); color: #fff; text-decoration: none; }

/* ===== Section Headers ===== */
.section-header {
	display: flex;
	align-items: center;
	font-weight: 600;
	font-size: 11px;
	text-transform: uppercase;
	letter-spacing: 0.5px;
	padding: 6px 8px;
	color: var(--text-secondary);
	background: var(--bg-secondary);
	border-bottom: 1px solid var(--border);
	cursor: pointer;
	user-select: none;
}
.section-header:hover { background: var(--bg-tertiary); }
.section-arrow { margin-right: 6px; font-size: 9px; }

/* ===== Grid Layout ===== */
.metric-grid {
	display: grid;
	grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
}
.metric-item {
	padding: 4px 8px;
	border-bottom: 1px solid var(--border);
	min-width: 0;
	overflow: hidden;
}
.metric-label {
	font-size: 10px;
	font-weight: 600;
	color: var(--text-muted);
	text-transform: uppercase;
	letter-spacing: 0.3px;
	white-space: nowrap;
	overflow: hidden;
	text-overflow: ellipsis;
}
.metric-value {
	font-size: 13px;
	font-family: var(--font-mono);
	overflow: hidden;
	text-overflow: ellipsis;
	white-space: nowrap;
	color: var(--text-primary);
}
.metric-value a { font-weight: bold; }
.metric-wide { grid-column: 1 / -1; }

/* ===== Ping Bar ===== */
.ping-bar {
	display: flex;
	align-items: center;
	gap: 8px;
	padding: 5px 8px;
	font-size: 12px;
	font-family: var(--font-mono);
	background: var(--bg-secondary);
	border-bottom: 1px solid var(--border);
}
.ping-dot {
	width: 8px;
	height: 8px;
	border-radius: 50%;
	flex-shrink: 0;
}

/* ===== Shuttle Bar ===== */
.shuttle-bar {
	display: none;
	align-items: center;
	gap: 8px;
	padding: 6px 8px;
	font-weight: bold;
	font-size: 13px;
	border-bottom: 1px solid var(--border);
	position: relative;
	overflow: hidden;
}
.shuttle-icon { flex-shrink: 0; font-size: 14px; }
.shuttle-text { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.shuttle-timer { font-family: var(--font-mono); flex-shrink: 0; }

.shuttle-warn   { background: rgba(204, 167, 0, 0.15); color: var(--health-warn); }
.shuttle-danger { background: rgba(244, 71, 71, 0.15); color: var(--health-bad); }
.shuttle-safe   { background: rgba(78, 201, 78, 0.15); color: var(--health-good); }

.shuttle-progress {
	position: absolute;
	bottom: 0;
	left: 0;
	right: 0;
	height: 2px;
	background: rgba(255, 255, 255, 0.08);
}
.shuttle-progress-fill {
	height: 100%;
	width: 0%;
	transition: width 0.3s linear;
}
.shuttle-warn .shuttle-progress-fill   { background: var(--health-warn); }
.shuttle-danger .shuttle-progress-fill { background: var(--health-bad); }
.shuttle-safe .shuttle-progress-fill   { background: var(--health-good); }

@keyframes shuttle-pulse {
	0%, 100% { opacity: 1; }
	50% { opacity: 0.5; }
}
.shuttle-pulse { animation: shuttle-pulse 1.5s ease-in-out infinite; }

/* ===== Data Table ===== */
.data-table {
	width: 100%;
	border-collapse: collapse;
}
.data-table td {
	padding: 2px 6px;
	border-bottom: 1px solid var(--border);
	font-size: 12px;
}
.data-label {
	font-weight: bold;
	white-space: nowrap;
	width: 1%;
	color: var(--text-secondary);
	padding-right: 8px;
}
.data-value { font-family: var(--font-mono); }

/* ===== Vote Section ===== */
.vote-section {
	padding: 4px 8px;
	border-top: 1px solid var(--border);
}
.vote-header {
	font-weight: bold;
	font-size: 13px;
	padding: 4px 0;
	color: var(--text-secondary);
}
.vote-table {
	width: 100%;
	border-collapse: collapse;
}
.vote-table td { padding: 2px 4px; font-size: 12px; }

/* ===== Verb Grid ===== */
.verb-search {
	width: calc(100% - 16px);
	margin: 6px 8px;
	padding: 6px 10px;
	font-size: 12px;
	font-family: var(--font-sans);
	background: var(--bg-secondary);
	border: 1px solid var(--border);
	border-radius: 4px;
	color: var(--text-primary);
	outline: none;
}
.verb-search:focus { border-color: var(--accent); }

.verb-grid {
	display: inline-flex;
	flex-wrap: wrap;
	padding: 4px 6px;
	gap: 4px;
}
.verb-pill {
	display: inline-block;
	padding: var(--verb-padding-v, 5px) var(--verb-padding-h, 10px);
	background: var(--bg-tertiary);
	border: 1px solid var(--border);
	border-radius: 4px;
	color: var(--text-primary);
	font-size: 12px;
	cursor: pointer;
	text-decoration: none;
	transition: background 60ms;
	white-space: nowrap;
}
.verb-pill:hover { background: var(--bg-hover); text-decoration: none; }
.verb-pill.favorited {
	background: var(--fav-bg);
	border-color: var(--fav-border);
}
.verb-pill.favorited:hover {
	background: rgba(232, 168, 32, 0.25);
}
/* ===== Verb Links Style ===== */
body.verb-style-links .verb-pill {
	background: transparent;
	border: none;
	border-radius: 0;
	padding: 2px 4px;
	text-decoration: underline;
	color: var(--text-primary);
}
body.verb-style-links .verb-pill:hover {
	background: transparent;
	text-decoration: underline;
	color: var(--accent);
}
body.verb-style-links .verb-pill.favorited {
	background: transparent;
	border: none;
	color: var(--fav-accent);
}
body.verb-style-links .verb-pill.favorited:hover {
	background: transparent;
	color: var(--fav-accent);
}
body.verb-style-links .verb-grid {
	gap: 2px;
}

.verb-sub-header {
	width: 100%;
	font-size: 11px;
	font-weight: 600;
	color: var(--text-secondary);
	text-transform: uppercase;
	letter-spacing: 0.5px;
	padding: 8px 0 2px 4px;
	border-bottom: 1px solid var(--border);
	margin-bottom: 2px;
}
.fav-empty-msg {
	padding: 20px;
	text-align: center;
	color: var(--text-muted);
	font-size: 12px;
}

/* ===== MC Tab ===== */
.mc-container { padding: 0; }

.mc-filter {
	width: calc(100% - 16px);
	margin: 4px 8px;
	padding: 5px 8px;
	font-size: 12px;
	font-family: var(--font-sans);
	background: var(--bg-secondary);
	border: 1px solid var(--border);
	border-radius: 4px;
	color: var(--text-primary);
	outline: none;
}
.mc-filter:focus { border-color: var(--accent); }

.mc-key-section {
	display: grid;
	grid-template-columns: repeat(auto-fill, minmax(var(--mc-grid-min, 200px), 1fr));
	gap: 0;
}
body.mc-grid-fixed .mc-key-section {
	grid-template-columns: repeat(var(--mc-grid-cols, 2), 1fr);
}
.mc-key-card {
	padding: 4px 8px;
	border-bottom: 1px solid var(--border);
}
.mc-key-header {
	display: flex;
	align-items: baseline;
	gap: 8px;
	margin-bottom: 2px;
}
.mc-key-name { font-weight: bold; font-size: 13px; }
.mc-key-name a { font-weight: bold; }
.mc-key-stats {
	font-size: 12px;
	color: var(--text-secondary);
	font-family: var(--font-mono);
}
.mc-key-table { border-collapse: collapse; margin: 2px 0 0 4px; }
.mc-key-dlabel {
	font-size: 11px;
	color: var(--text-secondary);
	padding: 0 10px 0 0;
	white-space: nowrap;
}
.mc-key-dval {
	font-size: 11px;
	font-family: var(--font-mono);
	color: var(--text-primary);
	padding: 0;
}

.mc-ss-table {
	width: 100%;
	border-collapse: collapse;
	font-size: 12px;
	table-layout: fixed;
}
.mc-ss-table th {
	position: sticky;
	top: 0;
	background: var(--bg-secondary);
	border-bottom: 2px solid var(--border);
	padding: 3px 4px;
	text-align: left;
	font-size: 11px;
	cursor: pointer;
	user-select: none;
	white-space: nowrap;
}
.mc-th-sort:hover { background: var(--bg-tertiary); }
.mc-sorted::after { content: " \25B2"; font-size: 9px; }
.mc-sorted.desc::after { content: " \25BC"; }

.mc-ss-table th:nth-child(1), .mc-ss-table td:nth-child(1) { width: 20px; text-align: center; }
.mc-ss-table th:nth-child(2), .mc-ss-table td:nth-child(2) { overflow: hidden; text-overflow: ellipsis; }
.mc-ss-table th:nth-child(3), .mc-ss-table td:nth-child(3) { width: 50px; }
.mc-ss-table th:nth-child(4), .mc-ss-table td:nth-child(4) { width: 44px; }
.mc-ss-table th:nth-child(5), .mc-ss-table td:nth-child(5) { width: 50px; }
.mc-ss-table th:nth-child(6), .mc-ss-table td:nth-child(6) { width: 38px; }
.mc-ss-table th:nth-child(7), .mc-ss-table td:nth-child(7) { width: 54px; }

.mc-ss-table td {
	padding: 2px 4px;
	border-bottom: 1px solid var(--border);
	white-space: nowrap;
	overflow: hidden;
}
.mc-ss-table tr:hover td { background: var(--bg-hover); }
.mc-num { text-align: right; font-family: var(--font-mono); }

.mc-state { font-weight: bold; font-family: var(--font-mono); }
.mc-state-2 { color: var(--health-good); }
.mc-state-1 { color: var(--text-muted); }
.mc-state-3, .mc-state-5 { color: var(--health-warn); }
.mc-state-4 { color: #6688ff; }
.mc-state-0 { color: var(--text-muted); }

.health-good { color: var(--health-good); }
.health-warn { color: var(--health-warn); }
.health-bad { color: var(--health-bad); font-weight: bold; }

.mc-bg a { font-style: italic; opacity: 0.7; }
.mc-offline { opacity: 0.4; }

/* ===== Sparklines ===== */
.sparkline { vertical-align: middle; margin-left: 6px; }

/* ===== Spells ===== */
.spell-card {
	display: flex;
	align-items: center;
	gap: 8px;
	padding: 4px 8px;
	border-bottom: 1px solid var(--border);
}
.spell-name { font-weight: bold; }
.spell-status { font-family: var(--font-mono); font-size: 11px; }
.spell-ready { color: var(--health-good); }
.spell-cooldown { color: var(--health-warn); }
.spell-nocharges { color: var(--health-bad); }

/* ===== Tickets ===== */
.ticket-summary {
	display: flex;
	flex-wrap: wrap;
	gap: 12px;
	padding: 6px 8px;
	border-bottom: 1px solid var(--border);
	font-size: 12px;
	background: var(--bg-primary);
}
.ticket-summary-item { font-weight: bold; }
.ticket-card {
	display: flex;
	flex-direction: column;
	gap: 4px;
	padding: 4px 8px;
	border-bottom: 1px solid var(--border);
	font-size: 12px;
	min-width: 0;
}
.ticket-card-header {
	display: flex;
	align-items: center;
	gap: 6px;
	min-width: 0;
}
.ticket-card-header--clickable { cursor: pointer; }
.ticket-card-header--clickable:hover .ticket-caret { color: var(--text-primary); }
.ticket-caret {
	color: var(--text-muted);
	font-size: 9px;
	width: 10px;
	flex-shrink: 0;
	text-align: center;
	user-select: none;
}
.ticket-indicator {
	width: 6px;
	height: 6px;
	border-radius: 50%;
	flex-shrink: 0;
}
.ticket-closed { opacity: 0.6; }
.ticket-header-row {
	display: flex;
	justify-content: space-between;
	gap: 8px;
	padding: 4px 8px;
	font-size: 12px;
	font-weight: bold;
	color: var(--text-secondary);
	border-bottom: 1px dashed var(--border);
}
.ticket-header-link, .ticket-header-link:visited { color: var(--accent); text-decoration: none; }
.ticket-header-link:hover { text-decoration: underline; }
.ticket-id {
	color: var(--text-muted);
	font-family: var(--font-mono, monospace);
	font-size: 11px;
	flex-shrink: 0;
}
.ticket-label {
	color: var(--text-primary);
	text-decoration: none;
	overflow: hidden;
	text-overflow: ellipsis;
	white-space: nowrap;
	flex: 1 1 auto;
	min-width: 40px;
}
.ticket-label:hover { text-decoration: underline; color: var(--accent); }
.ticket-meta {
	display: flex;
	align-items: center;
	gap: 6px;
	flex-shrink: 0;
	font-size: 11px;
	margin-left: auto;
}
.ticket-handler {
	color: var(--health-warn);
	font-weight: bold;
	max-width: 96px;
	overflow: hidden;
	text-overflow: ellipsis;
	white-space: nowrap;
}
.ticket-age { font-family: var(--font-mono, monospace); }
.ticket-preview {
	color: var(--text-muted);
	font-size: 11px;
	overflow: hidden;
	text-overflow: ellipsis;
	white-space: nowrap;
	padding-left: 18px;
	cursor: pointer;
}
.ticket-body {
	color: var(--text-secondary);
	font-size: 12px;
	padding: 4px 6px;
	margin-left: 18px;
	border-left: 2px solid var(--border);
	background: var(--bg-secondary);
	word-break: break-word;
	overflow-wrap: anywhere;
	white-space: pre-wrap;
	max-height: 240px;
	overflow-y: auto;
}
.ticket-actions {
	display: flex;
	flex-wrap: wrap;
	gap: 3px;
	padding-left: 18px;
}
.ticket-action-btn {
	background: transparent;
	border: 1px solid var(--border);
	color: var(--text-secondary);
	padding: 2px 6px;
	font-size: 10px;
	font-family: inherit;
	border-radius: var(--border-radius, 2px);
	cursor: pointer;
	min-height: 18px;
	flex: 0 0 auto;
}
.ticket-action-btn:hover { background: var(--bg-hover, var(--border)); color: var(--text-primary); }
.ticket-action-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 1px; }
.ticket-act-good:hover { color: var(--health-good); border-color: var(--health-good); }
.ticket-act-warn:hover { color: var(--health-warn); border-color: var(--health-warn); }
.ticket-act-bad:hover { color: var(--health-bad); border-color: var(--health-bad); }
.ticket-closed-toggle {
	padding: 4px 8px;
	color: var(--text-muted);
	font-size: 11px;
	cursor: pointer;
	user-select: none;
	border-bottom: 1px solid var(--border);
	border-top: 1px dashed var(--border);
}
.ticket-closed-toggle:hover { color: var(--text-primary); background: var(--bg-hover, var(--border)); }

/* ===== SDQL2 ===== */
.sdql-card {
	padding: 6px 8px;
	border-bottom: 1px solid var(--border);
}
.sdql-badge {
	display: inline-block;
	padding: 1px 6px;
	border-radius: 3px;
	font-size: 10px;
	font-weight: bold;
	margin-right: 6px;
}
.sdql-done { background: rgba(78, 201, 78, 0.2); color: var(--health-good); }
.sdql-run { background: rgba(204, 167, 0, 0.2); color: var(--health-warn); }
.sdql-query {
	font-family: var(--font-mono);
	font-size: 11px;
	color: var(--text-secondary);
	margin-top: 2px;
	word-break: break-all;
}

/* ===== Debug Tab ===== */
.debug-action-bar {
	display: flex;
	gap: 8px;
	padding: 8px;
	border-bottom: 1px solid var(--border);
}
.debug-btn {
	padding: 6px 14px;
	border: 1px solid var(--border);
	border-radius: 4px;
	background: var(--bg-tertiary);
	color: var(--text-primary);
	cursor: pointer;
	font-size: 12px;
	font-family: var(--font-sans);
}

function getTabOrder(name) {
	if (name === "Status") return 1;
	if (name === "MC") return 2;
	if (name === "Избранное") return 3;
	return 100 + name.charCodeAt(0);
}

function resolveTabDisplayName(name) {
	if (name.indexOf(".") !== -1) {
		var parts = name.split(".");
		if (State.splitAdminTabs && parts[0] === "Admin") return parts[1];
		return parts[0];
	}
	return name;
}

function createStatusTab(name) {
	var display = resolveTabDisplayName(name);
	if (display.trim() === "") return;
	if (document.getElementById("tab-" + display)) return;
	if (!State.verbTabs.includes(display) && !State.permanentTabs.includes(display)) return;

	var btn = el("button", "tab-btn");
	btn.id = "tab-" + display;
	btn.textContent = display;
	btn.style.order = getTabOrder(display);
	if (display === "Избранное") btn.classList.add("tab-fav");
	btn.onclick = function() {
		tab_change(display);
		this.blur();

	var spacerEl = document.getElementById("tab-bar-spacer");
	if (spacerEl) {
		tabBar.insertBefore(btn, spacerEl);
	} else {

	SendTabToByond(display);

	var btn = document.getElementById("tab-" + name);

	for (var i = State.verbTabs.length - 1; i >= 0; --i) {

	TakeTabFromByond(name);
	spacer.style.height = tabBar.offsetHeight + "px";

	if (container._lastHash === hash) return;
	container._lastHash = hash;
	container.textContent = "";
	for (var i = 0; i < rows.length; i++) {
		var wide = ("" + rows[i][1]).length > 32;
		container.appendChild(makeGridItem(rows[i][0], rows[i][1], wide));
	}
}

function makeSectionHeader(key, label, sections) {
	var div = el("div", "section-header");
	var arrow = el("span", "section-arrow", sections[key] ? "▼" : "▶");
	div.appendChild(arrow);
	// Keep the label in a TextNode reference so renderers can mutate it cheaply (e.g. update counts).
	var labelText = document.createTextNode(" " + label);
	div.appendChild(labelText);
	div.onclick = function() {
		sections[key] = !sections[key];
		arrow.textContent = sections[key] ? "▼" : "▶";
		div._toggle(key);
	};
	div._arrow = arrow;
	div._countText = labelText;
	div._toggle = function() {};
	return div;
}

function buildSparkline(data, minVal, maxVal, colorClass) {
	var W = 80, H = 24;
	var ns = "http://www.w3.org/2000/svg";
	var svg = document.createElementNS(ns, "svg");
	svg.setAttribute("width", W);
	svg.setAttribute("height", H);
	svg.setAttribute("viewBox", "0 0 " + W + " " + H);
	svg.setAttribute("class", "sparkline");

	var dMin = Infinity, dMax = -Infinity;
	for (var i = 0; i < data.length; i++) {
		var v = parseFloat(data[i]) || 0;
		if (v < dMin) dMin = v;
		if (v > dMax) dMax = v;
	}
	var lo = Math.min(minVal, dMin);
	var hi = Math.max(maxVal, dMax);
	if (hi === lo) hi = lo + 1;

	var points = [];
	var step = W / Math.max(data.length - 1, 1);
	for (var i = 0; i < data.length; i++) {
		var v = parseFloat(data[i]) || 0;
		var x = Math.round(step * i * 10) / 10;
		var y = Math.round((H - 2) - ((v - lo) / (hi - lo)) * (H - 4) + 2);
		points.push(x + "," + y);
	}

	var polyline = document.createElementNS(ns, "polyline");
	polyline.setAttribute("points", points.join(" "));
	polyline.setAttribute("fill", "none");
	polyline.setAttribute("stroke-width", "1.5");
	polyline.setAttribute("stroke-linejoin", "round");

	var color = "var(--health-good)";
	if (colorClass && colorClass.indexOf("bad") !== -1) color = "var(--health-bad)";
	else if (colorClass && colorClass.indexOf("warn") !== -1) color = "var(--health-warn)";
	polyline.setAttribute("stroke", color);

	svg.appendChild(polyline);
	return svg;
}

	if (!timerStr || timerStr === "--:--") return -1;
	var parts = timerStr.split(":");
	if (parts.length !== 2) return -1;
	return (parseInt(parts[0], 10) || 0) * 60 + (parseInt(parts[1], 10) || 0);

function draw_status() {
	if (!document.getElementById("tab-Status")) {
		createStatusTab("Status");
		State.currentTab = "Status";
	}

	var d = {};
	if (State.globalFast) {
		for (var k in State.globalFast) d[k] = State.globalFast[k];
	}
	if (State.globalSlow) {
		d.server = State.globalSlow;
	}
	if (State.tidiData) {
		d.tidi = State.tidiData;
	}

	if (!State.globalFast && !State.pingData) {
		statcontent.textContent = "Загрузка...";
		return;
	}

	st_ensureSkeleton();

	if (d.shuttle) {
		st_els.shuttle.style.display = "flex";
		var modeKey = d.shuttle[2] || "";
		var timerStr = d.shuttle[1] || "00:00";
		var totalSec = d.shuttle[3] || 0;
		var cfg = SHUTTLE_MODES[modeKey] || { label: d.shuttle[0], cls: "shuttle-warn", icon: "\u25B2" };

		setText(st_els.shuttleIcon, cfg.icon);
		setText(st_els.shuttleText, cfg.label);
		setText(st_els.shuttleTimer, timerStr);
		st_els.shuttle.className = "shuttle-bar " + cfg.cls;

		var remainSec = parseTimerSeconds(timerStr);
		if (totalSec > 0 && remainSec >= 0) {
			var pct = Math.max(0, Math.min(100, ((totalSec - remainSec) / totalSec) * 100));
			st_els.shuttleProgressFill.style.width = pct + "%";
			st_els.shuttleProgress.style.display = "";
		} else {
			st_els.shuttleProgress.style.display = "none";
		}
	} else {
		st_els.shuttle.style.display = "none";
	}

	if (st_sections.round && d.server) {
		fillGrid(st_els.roundGrid, d.server);
		st_els.roundGrid.style.display = "";
	} else if (!st_sections.round) {
		st_els.roundGrid.style.display = "none";
	}

	if (st_sections.time && d.time) {
		fillGrid(st_els.timeGrid, d.time);
		st_els.timeGrid.style.display = "";
	} else if (!st_sections.time) {
		st_els.timeGrid.style.display = "none";
	}

	if (st_sections.character) {
		var charHash = State.mobItems.join("\n");
		if (st_els.charTable._lastHash !== charHash) {
			st_els.charTable._lastHash = charHash;
			st_els.charTable.textContent = "";
			for (var i = 0; i < State.mobItems.length; i++) {
				var item = State.mobItems[i];
				if (typeof item !== "string" || item.trim() === "") continue;
				var parsed = st_parseMobItem(item);
				if (parsed) {
					var tr = el("tr");
					var td1 = el("td", "data-label", parsed[0]);
					var td2 = el("td", "data-value", parsed[1]);
					tr.appendChild(td1);
					tr.appendChild(td2);
					st_els.charTable.appendChild(tr);
				} else {
					var tr2 = el("tr");
					var td = el("td", "data-value", item);
					td.colSpan = 2;
					tr2.appendChild(td);
					st_els.charTable.appendChild(tr2);
				}
			}
		}
		var hasItems = State.mobItems.length > 0;
		st_els.charTable.style.display = hasItems ? "" : "none";
		st_els.charHeader.style.display = hasItems ? "" : "none";
	} else {
		st_els.charTable.style.display = "none";
	}

	var vp = State.voteParts;
	if (vp && vp[0] && vp[0][0]) {
		st_els.voteSection.style.display = "";
		st_els.voteSection.textContent = "";
		var table = el("table", "vote-table");
		for (var i = 0; i < vp.length; i++) {
			var part = vp[i];
			var tr = el("tr");
			var td1 = el("td", null, part[0]);
			var td2 = el("td");
			if (part[2]) {
				var a = el("a");
				a.href = "#";
				a.style.cursor = "pointer";
				if (part[2] === "disabled") {
					a.onclick = function(e) {
						if (e && e.preventDefault) e.preventDefault();
						byond_winset({ command: "Vote" });
						return false;
					};
				} else {
					a.onclick = (function(ref) {
						return function(e) {
							if (e && e.preventDefault) e.preventDefault();
							byond_topic("?src=" + ref);
							return false;
						};
					})(part[2]);
				}
				a.textContent = part[1];
				td2.appendChild(a);
			} else {
				td2.textContent = part[1];
			}
			tr.appendChild(td1);
			tr.appendChild(td2);
			table.appendChild(tr);
		}
		st_els.voteSection.appendChild(table);
	} else {
		st_els.voteSection.style.display = "none";
	}

	if (!st_fixSent && (State.verbTabs.length === 0 || State.verbs.length === 0)) {
		st_fixSent = true;

}

function mc_matchesFilter(name) {

function mc_sortAndReorder() {
	var rows = [];
	for (var name in mc_ss_rows) rows.push(mc_ss_rows[name]);
	var col = State.mcSortCol;
	var asc = State.mcSortAsc;
	rows.sort(function(a, b) {
		var ad = a._ssData;
		var bd = b._ssData;
		if (ad[SS_CAN_FIRE] !== bd[SS_CAN_FIRE]) return bd[SS_CAN_FIRE] - ad[SS_CAN_FIRE];
		if (col === SS_NAME) {
			var av = ("" + ad[col]).toLowerCase();
			var bv = ("" + bd[col]).toLowerCase();
			return asc ? (av < bv ? -1 : av > bv ? 1 : 0)
					   : (bv < av ? -1 : bv > av ? 1 : 0);
		}
		var an = parseFloat(ad[col]) || 0;
		var bn = parseFloat(bd[col]) || 0;
		return asc ? (an - bn) : (bn - an);
	});
	for (var i = 0; i < rows.length; i++) {
		if (mc_els.ssTbody.childNodes[i] !== rows[i]) {
			mc_els.ssTbody.insertBefore(rows[i], mc_els.ssTbody.childNodes[i]);
		}
	}
}

			ths[i].className = "mc-th-sort mc-sorted" + (State.mcSortAsc ? "" : " desc");

			mc_ss_rows[name] = tr;
			mc_els.ssTbody.appendChild(tr);
		}
		var cells = tr.childNodes;
		var state_letter = STATE_LETTERS[row[SS_STATE]] || "?";
		var can_fire = row[SS_CAN_FIRE];

		setText(cells[0], state_letter);
		cells[0].className = "mc-state mc-state-" + row[SS_STATE];

		var link = tr._nameLink;
		if (!link) {
			cells[1].textContent = "";
			link = el("a");
			cells[1].appendChild(link);
			tr._nameLink = link;
		}
		var dname = row[SS_IS_BG] ? name + " [BG]" : name;
		if (link.textContent !== dname) link.textContent = dname;
		link.href = "#";
		link.onclick = (function(r) {

var verbSearchTimers = {};
// Per-tab last query, so re-render after data change can repopulate without losing user's filter.
var verbLastQuery = {};

function draw_verbs(cat) {
	statcontent.textContent = "";

	var searchInput = el("input", "verb-search");
	searchInput.type = "text";
	searchInput.placeholder = "Поиск команд...";
	searchInput.autocomplete = "off";
	if (verbLastQuery[cat]) searchInput.value = verbLastQuery[cat];
	statcontent.appendChild(searchInput);

	var container = el("div");
	statcontent.appendChild(container);
	sortVerbs();

	// Map of pill -> the query strings it matches. Built once per draw, then filtered by toggling
	// display:none. This avoids thrashing the entire DOM on every keystroke for admins with 200+
	// verbs, and preserves focus/selection in the search input.
	var pillIndex = [];

	function buildVerbDOM() {
		container.textContent = "";
		pillIndex = [];
		var grid = el("div", "verb-grid");
		var additions = {};
		var subHeaders = {};

		var resolvedCat = cat;
		if (State.splitAdminTabs && cat.lastIndexOf(".") !== -1) {
			var sp = cat.split(".");
			if (sp[0] === "Admin") resolvedCat = sp[1];
		}

		var reversed = State.verbs.slice().reverse();
		for (var i = 0; i < reversed.length; i++) {
			var part = reversed[i];
			var verbCat = part[0];
			if (State.splitAdminTabs && verbCat.lastIndexOf(".") !== -1) {
				var sp2 = verbCat.split(".");
				if (sp2[0] === "Admin") verbCat = sp2[1];
			}
			var command = part[1];
			if (!command) continue;
			if (verbCat.lastIndexOf(resolvedCat, 0) !== 0) continue;
			if (verbCat.length !== resolvedCat.length && verbCat.charAt(resolvedCat.length) !== ".") continue;

			var subCat = verbCat.lastIndexOf(".") !== -1 ? verbCat.split(".")[1] : null;
			if (subCat && !additions[subCat]) {
				additions[subCat] = el("div", "verb-grid");
			}

			var pill = el("a", "verb-pill");
			pill.href = "#";
			if (isFavorite(part[0], command)) pill.classList.add("favorited");
			pill.textContent = command;
			pill.onclick = makeVerbOnclick(command);
			pill.oncontextmenu = (function(verbCatOrig, cmd) {
				return function(e) {
					e.preventDefault();
					toggleFavorite(verbCatOrig, cmd);
				};
			})(part[0], command);

			pillIndex.push({ el: pill, sub: subCat, search: command.toLowerCase() });
			(subCat ? additions[subCat] : grid).appendChild(pill);
		}

		container.appendChild(grid);

		for (var subKey in additions) {
			if (additions.hasOwnProperty(subKey)) {
				var hdr = el("div", "verb-sub-header", subKey);
				container.appendChild(hdr);
				container.appendChild(additions[subKey]);
				subHeaders[subKey] = { hdr: hdr, grid: additions[subKey] };
			}
		}
		return subHeaders;
	}

	var subHeaders = buildVerbDOM();

	function applyFilter(query) {
		// Toggle visibility instead of re-rendering. Hide whole sub-header sections when empty.
		var subVisibleCount = {};
		for (var i = 0; i < pillIndex.length; i++) {
			var entry = pillIndex[i];
			var matches = !query || entry.search.indexOf(query) !== -1;
			entry.el.style.display = matches ? "" : "none";
			if (entry.sub && matches) {
				subVisibleCount[entry.sub] = (subVisibleCount[entry.sub] | 0) + 1;
			}
		}
		for (var subKey in subHeaders) {
			if (!subHeaders.hasOwnProperty(subKey)) continue;
			var visible = subVisibleCount[subKey] || 0;
			subHeaders[subKey].hdr.style.display = visible ? "" : "none";
			subHeaders[subKey].grid.style.display = visible ? "" : "none";
		}
	}

	if (verbLastQuery[cat]) applyFilter(verbLastQuery[cat]);

	searchInput.oninput = function() {
		var val = this.value.toLowerCase();
		verbLastQuery[cat] = val;
		clearTimeout(verbSearchTimers[cat]);
		verbSearchTimers[cat] = setTimeout(function() { applyFilter(val); }, 60);
	};
}

function makeVerbOnclick(command) {
	return function(e) {
		e.preventDefault();
		run_after_focus(function() {
			send_byond_command(command.replace(/\s/g, "-"));
		});
	};
}

// AHELP_* enum constants must match code/__DEFINES/admin.dm
var AHELP_ACTIVE = 1, AHELP_CLOSED = 2, AHELP_RESOLVED = 3;

function ticketAgeText(seconds) {
	if (seconds == null || seconds < 0) return "";
	if (seconds < 60) return seconds + "с";
	var m = Math.floor(seconds / 60);
	var s = seconds % 60;
	if (m < 60) return m + "м " + s + "с";
	var h = Math.floor(m / 60);
	m = m % 60;
	return h + "ч " + m + "м";
}

function ticketAgeClass(seconds) {
	if (seconds == null) return "";
	if (seconds >= 600) return "val-bad";   // 10+ min — really stale
	if (seconds >= 180) return "val-warn";  // 3+ min — getting stale
	return "val-good";
}

function ticketStateInfo(meta) {
	var state = meta && meta.state;
	if (state === AHELP_ACTIVE) return { text: meta && meta.handler ? "В работе" : "Открыт", color: meta && meta.handler ? "var(--health-warn)" : "var(--health-good)", isClosed: false };
	if (state === AHELP_CLOSED) return { text: "Закрыт", color: "var(--text-muted)", isClosed: true };
	if (state === AHELP_RESOLVED) return { text: "Решён", color: "var(--text-muted)", isClosed: true };
	return { text: "", color: "var(--text-muted)", isClosed: false };
}

// Inline action descriptors mirror /datum/admin_help/proc/ClosureLinks in adminhelp.dm.
// Server-side hrefs accept the standard ahelp_action protocol; surfacing them here saves
// admins a round-trip into the chat window for the most common triage actions.
var TICKET_ACTIONS = [
	{ key: "reply",        label: "OTBET",  title: "Reply",   className: "" },
	{ key: "handle_issue", label: "HANDLE", title: "Handle",  className: "" },
	{ key: "close",        label: "CLOSE",  title: "Close",   className: "ticket-act-warn" },
	{ key: "resolve",      label: "RSLVE",  title: "Resolve", className: "ticket-act-good" },
	{ key: "reject",       label: "REJT",   title: "Reject",  className: "ticket-act-bad" }
];

// Render closed/resolved tickets behind a single collapsible row to keep the active list scannable.
var _ticketClosedExpanded = false;

// Per-ticket expand state, keyed by stable identifier (id/ref). Survives redraws so admins
// don't lose their place when DM pushes a tickets update. Stale keys are pruned on each draw.
var _ticketExpanded = {};

function _ticketKey(part) {
	var meta = part[3];
	if (meta && meta.id != null) return "id:" + meta.id;
	if (part[2]) return "ref:" + part[2];
	return null;
}

function _isTicketExpanded(part, isClosed) {
	var key = _ticketKey(part);
	if (key != null && Object.prototype.hasOwnProperty.call(_ticketExpanded, key)) {
		return _ticketExpanded[key];
	}
	// Default: active tickets are expanded (admins need to act on them), closed ones are collapsed.
	return !isClosed;
}

function _pruneExpandedState(seenKeys) {
	for (var k in _ticketExpanded) {
		if (Object.prototype.hasOwnProperty.call(_ticketExpanded, k) && !seenKeys[k]) {
			delete _ticketExpanded[k];
		}
	}
}

function draw_tickets() {
	// Preserve scroll position across redraws (toggle clicks, DM pushes).
	// Scroll happens on body/documentElement in this iframe, not on #statcontent.
	var scroller = document.scrollingElement || document.documentElement || document.body;
	var savedScroll = scroller ? scroller.scrollTop : 0;
	statcontent.textContent = "";
	if (!State.tickets || !State.tickets.length) {
		if (scroller) scroller.scrollTop = savedScroll;
		return;
	}

	var open = 0, inProgress = 0, closed = 0;
	var activeRows = [];
	var closedRows = [];
	var headerRows = [];
	var seenKeys = {};
	for (var i = 0; i < State.tickets.length; i++) {
		var t = State.tickets[i];
		var meta = t[3];
		var key = _ticketKey(t);
		if (key) seenKeys[key] = true;
		if (meta && meta.state != null) {
			if (meta.state === AHELP_ACTIVE) {
				if (meta.handler) inProgress++; else open++;
				activeRows.push(t);
			} else {
				closed++;
				closedRows.push(t);
			}
			continue;
		}
		// Header rows or legacy entries without metadata — preserve original behavior.
		var labelText = ("" + (t[0] || "")).toLowerCase();
		if (labelText.indexOf("ticket") !== -1 || labelText.indexOf("communications") !== -1 || labelText.indexOf("disconnected") !== -1) {
			headerRows.push(t);
		} else if (labelText.indexOf("close") !== -1 || labelText.indexOf("resolve") !== -1 || labelText.indexOf("закр") !== -1) {
			closed++;
			closedRows.push(t);
		} else {
			activeRows.push(t);
		}
	}
	_pruneExpandedState(seenKeys);

	var summary = el("div", "ticket-summary");
	summary.appendChild(el("span", "ticket-summary-item val-good", "Открыто: " + open));
	summary.appendChild(el("span", "ticket-summary-item val-warn", "В работе: " + inProgress));
	summary.appendChild(el("span", "ticket-summary-item", "Закрыто: " + closed));
	statcontent.appendChild(summary);

	for (var hi = 0; hi < headerRows.length; hi++) {
		statcontent.appendChild(_makeTicketHeaderRow(headerRows[hi]));
	}
	for (var ai = 0; ai < activeRows.length; ai++) {
		statcontent.appendChild(_makeTicketCard(activeRows[ai], false));
	}
	if (closedRows.length) {
		var toggle = el("div", "ticket-closed-toggle");
		toggle.textContent = (_ticketClosedExpanded ? "▼ Скрыть" : "▶ Показать") + " закрытые (" + closedRows.length + ")";
		toggle.onclick = function() {
			_ticketClosedExpanded = !_ticketClosedExpanded;
			draw_tickets();
		};
		statcontent.appendChild(toggle);
		if (_ticketClosedExpanded) {
			for (var ci = 0; ci < closedRows.length; ci++) {
				statcontent.appendChild(_makeTicketCard(closedRows[ci], true));
			}
		}
	}

	if (State.interviewManager && State.interviewManager.interviews && State.interviewManager.interviews.length > 0) {
		draw_interviews();
	}

	if (scroller) scroller.scrollTop = savedScroll;
}

function clampZoom(value) {

function safeParse(str, fallback) {

// DM sends this once per session to assert which payload shape it speaks.
// On mismatch we log a single warning to the console and ask BYOND to reload the cached HTML.
// (The cached HTML is the most common cause of mismatch — WebView2 holds an old build.)
function set_protocol_version(ver_str) {
	var ver = parseInt(ver_str, 10);
	if (!ver) return;
	State.protocolVersion = ver;
	if (ver === EXPECTED_PROTOCOL_VERSION) return;
	if (State.protocolMismatchReported) return;
	State.protocolMismatchReported = true;
	try {
		console.warn("[statbrowser] Protocol mismatch: client expects " + EXPECTED_PROTOCOL_VERSION + ", server speaks " + ver + ". Asking BYOND to reload the panel.");
	} catch (e) {}
	// Best-effort: ask DM to re-browse the file. Hosts that don't expose this href harmlessly drop it.
	byond_topic("?reload_statbrowser=1");

function update_mc(server_data_encoded, ss_data_encoded, coords_entry, iteration_str) {
	// DM ships an iteration counter (Master.iteration) so JS can dedupe identical full payloads
	// without JSON.stringify-hashing every update. When iteration is unchanged, DM omits the heavy
	// payload and only ships fresh coords. We update only what changed and skip the redraw call
	// in the coords-only case unless the eye position string actually moved.
	var iter = iteration_str != null && iteration_str !== "" ? parseInt(iteration_str, 10) : NaN;
	var hasFullPayload = !!(server_data_encoded && ss_data_encoded);
	if (hasFullPayload) {
		var serverData = safeParse(server_data_encoded);
		var ssData = safeParse(ss_data_encoded);
		if (!serverData || !ssData) return;
		State.mcServerData = serverData;
		State.mcSSData = ssData;
		// Track iteration if DM provided it; else bump locally so renderer dirty checks still trigger
		// (covers older DM payloads or any path that doesn't include the counter).
		if (!isNaN(iter)) State.mcIteration = iter;
		else State.mcIteration = (State.mcIteration | 0) + 1;
	}
	var prevCoords = State.mcServerData.coords;
	if (coords_entry != null && coords_entry !== "") {
		State.mcServerData.coords = coords_entry;
	}
	addPermanentTab("MC");
	if (_settingsActive || State.currentTab !== "MC") return;
	// Skip the full draw call in the coords-only case unless coords actually changed.
	// All other sections are dirty-checked via mcIteration so they'd be no-ops anyway.
	if (!hasFullPayload && coords_entry === prevCoords) return;
	draw_mc();
}

	turfHideCheck.type = "checkbox";
	turfHideCheck.className = "settings-checkbox";
	turfHideCheck.checked = !!themeState.turfHideIcons;
	turfHideCheck.onchange = function() {
		themeState.turfHideIcons = turfHideCheck.checked;
		var wasPre = themeState.preset;
		markCustomIfModified(themeState);
		saveTheme(themeState);
		applyTheme(themeState);
		if (themeState.preset !== wasPre) draw_settings();
	};
	turfHideRow.appendChild(turfHideCheck);
	turfSection.appendChild(turfHideRow);

	var turfFontRow = el("div", "settings-row");
	turfFontRow.appendChild(el("span", "settings-label", "Размер текста"));
	var turfFontSlider = document.createElement("input");
	turfFontSlider.type = "range";
	turfFontSlider.className = "settings-slider";
	turfFontSlider.min = "8";
	turfFontSlider.max = "18";
	turfFontSlider.step = "1";
	turfFontSlider.value = themeState.turfFontSize != null ? themeState.turfFontSize : 12;
	var turfFontValue = el("span", "settings-slider-value", turfFontSlider.value + "px");
	turfFontSlider.oninput = function() {
		themeState.turfFontSize = parseInt(turfFontSlider.value);
		turfFontValue.textContent = turfFontSlider.value + "px";
		var wasPre = themeState.preset;
		markCustomIfModified(themeState);
		saveTheme(themeState);
		applyTheme(themeState);
		if (themeState.preset !== wasPre) draw_settings();
	};
	turfFontRow.appendChild(turfFontSlider);
	turfFontRow.appendChild(turfFontValue);
	turfSection.appendChild(turfFontRow);

	panel.appendChild(turfSection);

	// ===== MC tab section (admin-only tab; the controls are shown to everyone but only affect MC) =====
	var mcSection = el("div", "settings-section");
	mcSection.appendChild(el("div", "settings-section-title", "MC-вкладка (админ)"));
	addGridRow(mcSection, themeState, {
		colLabel: "Колонок в сетке",
		colKey: "mcGridColumns",
		minLabel: "Мин. ширина карточки",
		minKey: "mcGridMinWidth",
		minDefault: 200, minMin: 120, minMax: 360, minStep: 10
	});
	panel.appendChild(mcSection);

	var advSection = el("div", "settings-section");
	advSection.appendChild(el("div", "settings-section-title", "Дополнительно"));

	var radRow = el("div", "settings-row");
	radRow.appendChild(el("span", "settings-label", "Скругление углов"));
	var radSlider = document.createElement("input");
	radSlider.type = "range";
	radSlider.className = "settings-slider";
	radSlider.min = "0";
	radSlider.max = "12";
	radSlider.step = "1";
	radSlider.value = themeState.borderRadius != null ? themeState.borderRadius : 4;
	var radValue = el("span", "settings-slider-value", radSlider.value + "px");
	radSlider.oninput = function() {
		themeState.borderRadius = parseInt(radSlider.value);
		radValue.textContent = radSlider.value + "px";
		var wasPre = themeState.preset;
		markCustomIfModified(themeState);
		saveTheme(themeState);
		applyTheme(themeState);
		if (themeState.preset !== wasPre) draw_settings();
	};
	radRow.appendChild(radSlider);
	radRow.appendChild(radValue);
	advSection.appendChild(radRow);

	var cssRow = el("div", "settings-row");
	cssRow.style.flexDirection = "column";
	cssRow.style.alignItems = "stretch";
	cssRow.appendChild(el("span", "settings-label", "Свой CSS"));
	var cssArea = document.createElement("textarea");
	cssArea.className = "settings-textarea";
	cssArea.placeholder = "/* Ваш CSS здесь */";
	cssArea.value = themeState.customCSS || "";
	cssArea.oninput = function() {
		themeState.customCSS = cssArea.value;
		var wasPre = themeState.preset;
		markCustomIfModified(themeState);
		saveTheme(themeState);
		applyTheme(themeState);
		if (themeState.preset !== wasPre) draw_settings();
	};
	cssRow.appendChild(cssArea);
	advSection.appendChild(cssRow);
	panel.appendChild(advSection);

	var actions = el("div", "settings-actions");

	var resetBtn = el("button", "settings-action-btn", "Сброс");
	resetBtn.onclick = function() {
		var def = getDefaultThemeState();
		saveTheme(def);
		applyTheme(def);
		draw_settings();
	};
	actions.appendChild(resetBtn);

	var exportBtn = el("button", "settings-action-btn", "Экспорт");
	exportBtn.onclick = function() {
		var json = exportTheme(loadTheme());
		if (navigator.clipboard && navigator.clipboard.writeText) {
			navigator.clipboard.writeText(json).then(function() {
				exportBtn.textContent = "Скопировано!";
				setTimeout(function() { exportBtn.textContent = "Экспорт"; }, 1500);
			});
		} else {
			var ta = document.createElement("textarea");
			ta.value = json;
			document.body.appendChild(ta);
			ta.select();
			document.execCommand("copy");
			document.body.removeChild(ta);
			exportBtn.textContent = "Скопировано!";
			setTimeout(function() { exportBtn.textContent = "Экспорт"; }, 1500);
		}
	};
	actions.appendChild(exportBtn);

	var importBtn = el("button", "settings-action-btn", "Импорт");
	importBtn.onclick = function() {
		var json = prompt("Вставьте JSON темы:");
		if (json) {
			var imported = importTheme(json);
			if (imported) {
				saveTheme(imported);
				applyTheme(imported);
				draw_settings();
			} else {
				alert("Неверный формат JSON");
			}
		}
	};
	actions.appendChild(importBtn);
	panel.appendChild(actions);

	statcontent.appendChild(panel);
}

;

		_settingsActive = false;
		renderCurrentTab();
	} else {

	}
};

function restoreFocus() {
	var tag = document.activeElement && document.activeElement.tagName;
	if (tag === "INPUT" || tag === "TEXTAREA" || tag === "SELECT") return;
	run_after_focus(function() {
		byond_winset({ "map.focus": "true" });
	});
}
document.addEventListener("mouseup", restoreFocus);
document.addEventListener("keyup", restoreFocus);

loadFavorites();

if (!State.currentTab) {
	addPermanentTab("Status");
	tab_change("Status");
}

window.onload = function() {
	NotifyByondOnload();
};

function NotifyByondOnload() {
	byond_winset({ command: "Panel-Ready" });
}

setTimeout(NotifyByondOnload, 500);
setTimeout(NotifyByondOnload, 1500);

function getCookie(cname) {
	var name = cname + "=";
	var ca = document.cookie.split(";");
	for (var i = 0; i < ca.length; i++) {
		var c = ca[i];
		while (c.charAt(0) === " ") c = c.substring(1);
		if (c.indexOf(name) === 0) return decodeURIComponent(c.substring(name.length, c.length));
	}
	return "";
}
