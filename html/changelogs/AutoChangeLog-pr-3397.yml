author: Herobrine998
delete-after: true
changes:
  - rscadd: Добавлен новый градиент для волос Full
  - rscadd: Глав теперь нельзя протащить в инфинити, пока они спят или в наручниках
  - rscadd: Добавлена алерт-кнопка квантум пада для активации
  - bugfix: Модуль springlock больше не дамажит гениталии
  - bugfix: Крюмонитор теперь не показывает спящих, как убитых
  - bugfix: Небольшой фикс сайзтула и слаткурити пояса
  - bugfix: В сумке предметы теперь всегда будут по центру
  - bugfix: Пофикшены некоторые мгновенные смерти, теперь они не оставляют кости (ГК,
      призраки НарСи и т.д.)
  - bugfix: Из стиральной машинки теперь можно выбраться в наручниках
  - bugfix: Пофикшена цена разборки стоек для ящиков
  - bugfix: Продвинутая швабра, хвост ксеносов, сориум и черная материя теперь не
      откидывает призраков
  - bugfix: Поправлен choice box (carpet) и добавлена радиалка
  - bugfix: Исправлено ??? в результатах голосований
  - bugfix: Исправлено отсутствие возможности использовать ПДА в ящиках
  - qol: Ассортимент синдивендора улучшен
  - qol: Уменьшены некоторые незначительные предметы (Спрей для волос, пробка, сайзтул)
  - qol: Pray теперь будет отображаться в админ чате, а не в админ логах
  - qol: Патроны в автолате теперь создаются в +- 4 раза быстрее
  - qol: MagiVend у магов пополнен
  - qol: В колормате теперь можно красить tailbag и wallet
  - balance: Зомби теперь быстро рвут наручники
  - balance: Добавлена задержка 0.9 секунд на сжатие растений
  - balance: Уменьшен вес крошечных и маленьких предметов в соответствии с пропорцией
      (размер в сумке)
  - code_imp: Добавлен дефайн для хранилищ, которым не требуется проверка суммарного
      веса предметов, а только кол-во мест (коробки ОБР, бс техники)
