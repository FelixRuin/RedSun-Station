author: DuLL-FoX
delete-after: true
changes:
  - code_imp: 'Подвижные источники света переведены на оверлейную систему: движение
      с фонарём больше не нагружает движок света'
  - bugfix: Служебный объект света убран из contents турфа - камеры и обходы контейнеров
      его больше не видят
  - tweak: Конус ручных фонариков теперь текстурный (поворот и движение мгновенные)
  - bugfix: Статичные флудлайты и уличные фонари с большим радиусом (Black Mesa, ивент-лампы,
      праздничные) больше не режутся перф-капом дальности до 8 тайлов
  - code_imp: Оверлейные источники света (ПДА, лампы фонарного столба) управляются
      через корректные сеттеры вместо легаси-вызова
  - bugfix: После телепорта на отложенный z-уровень свет прогружается сразу, а не
      висит чёрным
  - bugfix: Призраки прогружают динамический свет при прыжке на ещё не освещённый
      z-уровень
  - bugfix: Свет на z-уровне с прерванной прогрузкой восстанавливается фоновым сканером,
      если на уровне есть игрок или гост
  - bugfix: Синхронный дренаж очередей света больше не теряет источники, помеченные
      на обновление во время прогрузки
