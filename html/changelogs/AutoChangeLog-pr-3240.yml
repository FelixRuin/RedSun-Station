author: Herobrine998
delete-after: true
changes:
  - rscadd: "В вендомат и общий лодаут добавлены: Polychromatic Ranger Poncho, Polychromatic\
      \ Ranger Cape, Occult collector's outfit и Occult collector's coat"
  - rscadd: Для всего донатного оружия добавлен макрос DONATE_ITEM_TOOLTIP_PARENT,
      что при осмотре оружия будет выводить tooltip с названием того, чем является
      этот рескин на самом деле
  - balance: Для донатных модкитов добавлен прок, что переносит текущий магазин, патрон
      из патронника и pin в рескин. Теперь раундстарт кодовые пины не будут обходиться
      рескинами и появляться магазин с боевыми.
  - bugfix: Пофикшены баги/оверрайды в донатном оружии, у некоторых названия типов
      и спрайтов типизированы
  - code_imp: Добавлены дефайн span_tooltip и его потомки, что бы не прописывать каждый
      раз стили тултипа
  - code_imp: Для всего донатного оружия добавлен макрос DONATE_ITEM_TOOLTIP_PARENT,
      что при осмотре оружия будет выводить tooltip с названием того, чем является
      этот рескин на самом деле
