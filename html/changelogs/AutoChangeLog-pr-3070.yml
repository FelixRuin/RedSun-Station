author: MrPe4henika
delete-after: true
changes:
  - rscadd: добавлен IPC Synthetic Constructor для робототехники
  - rscadd: добавлены новые IPC-компоненты и дизайны для печати, включая голову и
      торс IPC
  - rscadd: добавлена сборка IPC из MMI и позитронного мозга, включая ghost-role сценарий
      для пустой позитронки
  - qol: добавлен TGUI-интерфейс сборщика с предпросмотром, таймером, прогрессом и
      подтверждением неполной сборки
  - qol: добавлена настройка имени, экрана, размера шасси, серий протезов, имплантов
      и половых систем при сборке IPC
  - balance: повышена стоимость сборки IPC по ресурсам, при этом улучшенные детали
      фабрикатора уменьшают расход материалов
  - image: добавлены новые IPC-спрайты серий протезов и обновлён внешний вид сборщика
