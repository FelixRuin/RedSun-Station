author: Herobrine998
delete-after: true
changes:
  - rscadd: Для станции добавлен новый нейтральный трейт. Он будет раз в 5-15 минут
      спавнить раскрытый разлом еретика.
  - rscadd: Еретику добавлены 2 новые способности, призыв книги и призыв сердца. Они
      позволяют призывать и отзывать книгу в null пространство. Работает только с
      предметами внутри рук/карманов/сумки и т.д. на вас или предметах на тайле под
      вами. Это не заметно для окружающих, но для тех, кто стоит вплотную, будет слышен
      тихий звук.
  - rscadd: Святая вода в количестве необходимом для деконверта культистов, будет
      заставлять "выплевывать" вещи из подпространства еретика
  - bugfix: Еретику больше не будут попадаться цели на жертву с квирком 1 жизнь
