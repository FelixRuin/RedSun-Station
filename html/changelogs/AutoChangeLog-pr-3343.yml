author: Herobrine998
delete-after: true
changes:
  - rscadd: В продавец ноутбуков добавлен принтер на 30 листов (был только на 15)
  - rscadd: На командные консоли предустановлена программка манифеста
  - qol: При использовании paper bin или package wrapper на компьютер с принтером,
      теперь бумага будет загружаться автоматически
  - qol: При разборе консоли/ноута во 2 или 3ем интентах, вы выкрутите сразу все детали
  - bugfix: Пофикшена доступность программ после обновления ПДА
  - bugfix: Пофикшен баг с не обновлением интерфейса в программке смены доступа и
      возможной выдачей полного
  - bugfix: Монитор экипажа теперь могут открывать призраки + при смерти всегда будет
      красный цвет индикатора, вне зависимости от урона
