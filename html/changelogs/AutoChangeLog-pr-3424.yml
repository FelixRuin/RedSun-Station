author: DuLL-FoX
delete-after: true
changes:
  - bugfix: Сотни тайлов больше не висят в атмосферной обработке вечно (некрополь,
      космо-руины, комнаты-баллоны, тайлы под цельными окнами) - фоновая стоимость
      атмосферы упала в несколько раз
  - bugfix: Газ от разлагающихся трупов снова расползается по всей комнате, а не копится
      на одном тайле
  - bugfix: 'Поверхность IceMoon больше не молотит атмосферу вечно: усреднение excited-групп
      не смешивает разные планетарные атмосферы, а наружные пропасти получили планетарное
      небо вместо станционного воздуха - стоимость атмосферы карты упала на порядок'
  - tweak: Экстерьеры космо-руин с планетарной атмосферой больше не сдувают свой воздух
      в космос
  - tweak: Клоковые полы вне Рибе больше не дают бесконечный станционный воздух
  - code_imp: Простаивающие атмос-машины (венты, скрубберы, осевшие канистры, пустые
      порт-коннекторы) больше не обрабатываются каждые полсекунды - фаза машинерии
      подешевела вдвое
  - code_imp: Автономный headless-бенчмарк оседания атмосферы (tools/atmos_bench)
      - прогон карты без игроков с переписью вечно активных тайлов, в боевые сборки
      не компилируется
  - admin: Новый дебаг-верб "Atmos Benchmark" для тестовых сборок - запись метрик
      SSair в JSONL для анализа производительности
  - bugfix: джетпаки снова тратят газ при полёте - выхлоп уходит в турф под носителем,
      а не переливается сам в себя
