author: Herobrine998
delete-after: true
changes:
  - rscadd: Добавлена универсальная система проверки кода (и вообще любых условий)
      у имплантов (у любых органов)
  - balance: Все станционные импланты в техфабах, что требовали код для печати, переделаны.
      Теперь их можно будет активировать только в заданный код. При понижении кода
      импланты автоматически деактивируются и заблокируются. Для новых "Корпоративных"
      имплантов сделаны новые спрайты или затемнены цвета по сравнению с обычными
      версиями. Изменения не касаются ОБР и вообще любых вне станционных предметов/мобов.
      Какой код нужен для импланта можно увидеть по шифтклику или при попытке активации.
      Все корпоративные импланты можно емагнуть, убрав ограничение доступа.
  - balance: Все дизайны в техфабах, имплантов, что требовали доступ, заменены на
      корпоративные версии. При этом в хакнутом техфабе (который стоит на ДСах) все
      еще можно будет делать обычные импланты. (В консоли изучений обычные импланты
      тоже не видны, если ее не емагнуть)
  - balance: Термальные импланты теперь не дают -2 к защите от вспышек, пока выключены
      (но и не дают ночное зрение)
  - balance: Импланты лечения (HEALER-BB, HEALER-TO, REVITALIER) при ЕМП теперь вместо
      урона по дыхалке, лечат вас в "обратную" сторону (наносят урон). Сила урона
      зависит от мощности ЕМП.
  - refactor: Повторяющиеся проки связанные с получением имени кода или цвета заменены
      на дефайны.
  - bugfix: Пофикшено, что антаг органы убивали слаймов
  - rscadd: Импланты HUD теперь можно отключать
