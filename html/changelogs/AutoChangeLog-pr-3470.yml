changes:
  - bugfix: Директор больше не сохраняет бюджет и паузы после неудачного спауна антагониста
  - bugfix: Гост-антагонисты заранее проверяются на наличие подходящих кандидатов
  - qol: В панели директора улучшено отображение причин выбора и отказа событий
  - qol: В панели директора отображаются параметры компенсации ранней потери антагонистов
  - balance: Intensity гост-антагонистов теперь зависит от числа оставшихся в живых
      ролей
  - balance: При ранней безрезультатной потере антагониста неотработанная доля его
      стоимости возвращается директору
