author: DuLL-FoX
delete-after: true
changes:
  - bugfix: Эмоции, пресеты Color Mate, плейлисты музыкального автомата, татуировки,
      имена факсов и другие поля с управляющими символами в названии больше не ломают
      кнопки и панели. Уже сломанные элементы чинятся при загрузке персонажа.
  - bugfix: Имена и тексты в лодауте, нанитах, схемах, рингтонах PDA и др. больше
      не накапливают артефакты вида "&amp;amp;" при повторных сохранениях.
  - bugfix: Нанитный сенсор речи теперь срабатывает на фразы со спецсимволами.
