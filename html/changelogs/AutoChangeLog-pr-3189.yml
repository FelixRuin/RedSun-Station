      слот, а в первый попавшийся с одинаковым путем
  - bugfix: Пофикшено, что бутылка воды и большая бутылка воды в автомате с газировками
      считались одним предметом
  - rscadd: В медицинские наномеды, вместо бесполезных кейсов с ручкой и бумажкой
      в премиум добавлены простые хирург. наборы и добавлен 1 трубный РЦД
  - rscadd: Вендор БМов получил увеличение кол-во ассортимента + получил бутылки глюкозы
  - refactor: Кастомный вендор теперь не будет сжирать любые ID карты, у которых есть
      привязанный аккаунт и не получится загрузить предмет, если он не привязан
  - refactor: Дизайны кастомного вендора убраны из техфабов (они есть в автолате)
