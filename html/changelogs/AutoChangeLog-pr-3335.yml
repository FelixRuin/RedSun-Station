author: DuLL-FoX
delete-after: true
changes:
  - bugfix: настройка Hide ckey теперь скрывает сикеи ИИ и боргов в раундэнд-отчёте
  - bugfix: health sensor не выключается при сборке с игнитером, граната с ним снова
      триггерится от смерти носителя
  - bugfix: сердце и печень воксов больше не гниют
  - bugfix: гостроли больше не становятся целями антагов и жертвой Нар-Си
  - bugfix: holo-collar с замком снова меняет цвет
  - bugfix: фауна без рук больше не может раздевать тела; манипуляторы боргов и когти
      взрослых ксеноморфов считаются за руки
  - bugfix: кловорк-броня не тратит кулдаун при провале надевания
  - bugfix: еретик получает заряды кодекса за жертву, даже если кодекс в хранилище
      МОДа
  - bugfix: портальные фонарик и трусики вставляются с объявлением в чат, задержкой
      и уведомлением цели
  - tweak: полёт по мусоропроводу для мобов замедлен до видимого (предметы летают
      как раньше)
  - qol: стратогейзер кловорков поясняет в осмотре, почему не работает в космосе
