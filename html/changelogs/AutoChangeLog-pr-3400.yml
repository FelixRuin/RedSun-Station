author: DuLL-FoX
delete-after: true
changes:
  - code_imp: атмосферные машины без работы уходят в спячку и мгновенно просыпаются
      по событиям; excited groups не пересобираются от каждого вдоха; планетарная
      регенерация идёт к общему шаблону; реакции ищутся через индекс по ключевому
      газу
  - bugfix: планетарные поверхности (лавленд, аваймиссии) больше не держат десятки
      тысяч устаканившихся турфов вечно активными вокруг одной утечки; краевая вентиляция
      в космос больше не высасывает воздух целых зон через усреднение; вент над пустой
      трубой больше не держит комнату вечно активной; разобранные атмос-машины корректно
      собираются сборщиком мусора; продвинутая швабра больше не раитаймит при спавне
      маплоадером
  - balance: планетарная атмосфера восстанавливается к своему шаблону с апстримной
      силой - дыры и перегревы на планетах затягиваются заметно быстрее
  - admin: новый верб Atmos Active Turfs Report - разбивка активных турфов по z-уровням
      и областям для поиска источников атмос-чурна
  - server: заметно снижена стоимость SSair на устаканившейся станции и на планетарных
      z-уровнях; телеметрия метров и сенсоров шлётся раз в 2 секунды
