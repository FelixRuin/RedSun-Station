author: DuLL-FoX
delete-after: true
changes:
  - bugfix: Починена запись логов подключений, админ-логов и опросов в базу данных
  - bugfix: Событие "Door Runtime" больше не вызывает заморозку сервера при блокировке
      и разблокировке шлюзов
  - bugfix: Пустой клоункар снова уязвим для ближнего боя, атака по нему не вызывает
      ошибок
  - bugfix: Окно Клеточного Эмпориума корректно закрывается при потере способностей
      генлинга
  - bugfix: Битый преф градиента волос больше не ломает отрисовку причёски
  - bugfix: Кнопка Dementor теперь действительно отключает менторские уведомления
      у администраторов
  - server: Расширены колонки флагов admin_ranks (см. database_changelog 5.13)
  - code_imp: Processing-подсистемы автоматически профилируют дорогие проходы; warnfail-лог
      GC печатает улики держателей
