      z-уровнях; телеметрия метров и сенсоров шлётся раз в 2 секунды
  - bugfix: подсветка слов снова читается на лювд-тексте и пении, вместо цветной плашки
  - tweak: 'стили чата стали спокойнее: без градиентов, гигантских шрифтов, блюра
      и резкого мерцания; расовые голоса больше не сбрасывают шрифт игрока'
  - qol: 'новая вкладка "Стили текста" в настройках чата: цвет, начертание, размер
      и анимация для частых стилей сообщений, либо их полное отключение'
  - code_imp: 'Подвижные источники света переведены на оверлейную систему: движение
      с фонарём больше не нагружает движок света'
