author: Herobrine998
delete-after: true
changes:
  - rscadd: Добавлены новые 8 unholy интеракций
  - refactor: Переработаны 2 старые unholy интеракции
  - qol: Интеракции на уменьшение груди и живота доступны теперь в любой момент, а
      не только пока обнажены
  - bugfix: Исправлены все интеракции, что поломались из-за is_hidden. Флаг is_hidden
      корректно имплементирован во все интеракции. Все интеракции проверены на локалке
      и теперь действительно скрывают звук/сообщение до 1 тайла при активации. (Не
      касается клоунских эффектов в интеракциях, где они есть)
  - bugfix: Пофикшено, что живот, грудь и попа при уменьшении до 0 удалялись из тела
  - bugfix: Исправлен эффект "колодца" звуков у всех интеракций и отсутствие затухание
      звуков
  - bugfix: Пофикшена интеракция одной ногой, был текст как с двумя
  - code_imp: Unholy интеракции разделены на отдельные файлы
  - qol: Квантум пады теперь не сбрасывают носимых на себе персонажей при телепортации
      и их можно активировать, "занятой" рукой (заглушкой, что появляется при ношении
      или передвижении на персонаже)
