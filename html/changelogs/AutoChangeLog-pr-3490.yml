author: DuLL-FoX
delete-after: true
changes:
  - bugfix: 'Директор снова выдаёт мидраунд-антагонистов на высокой угрозе: починен
      вылет проверки готовности рулсетов при витринной угрозе выше 100 или ниже 10'
  - bugfix: Стартовые гангстеры Семей учитываются антаг-нагрузкой директора как рулсет
      с затуханием, а не по полной ставке с каждой головы - директор больше не душит
      раунд Семей отказом от всех прочих антагонистов
  - bugfix: Кнопка замены выбора директора реально предлагает замену вместо тихой
      отмены; замена после провала гост-опроса выбирается по средствам кошелька и
      приходит сразу
  - balance: Цель копилки антаг-пулов перевыбирается при появлении новых доступных
      антагов - дьявол больше не монополизирует начало хард-раундов, а генлинг-метеор
      - медиум
  - balance: 'Ребаланс гост-пула: генлинг-метеор реже (вес 8 -> 6, максимум 2 за раунд),
      ранние гост-роли прижаты по весу, вармонгеры без дикого веса 15, пороги онлайна
      кошмара/дракона/абдукторов/пиратов/ниндзи/ксеноморфов снижены под реальный поп'
  - balance: Дьявол и морф приходят не раньше 20-й минуты раунда
  - balance: Антаги вне рулсетов (жетон/админ/вербовка) не считаются нагрузкой вне
      станции и затухают по возрасту, как рулсетные - директор не блокирует новых
      антагов из-за невидимых
  - rscadd: 'Новые экипажные мидраунд-антагонисты: Heretic Awakening и Latent Changeling
      - экипажная инжекция больше не всегда трейтор'
  - admin: Панель директора показывает вклад антагов вне рулсетов отдельной строкой
      в "Активных вкладах" и называет их по именам
  - balance: Тяжёлые антаг-команды покупаются только в достаточно пустой раунд, а
      лёгкие инжекции подбираются по свободному месту до цели - конец качелям "полчаса
      тишины, залп, локаут"
  - balance: Улетевшие со станции гост-команды давят на антаг-клапан вполсилы и затухают
      по возрасту - рейдеры с лутом не запирают новых антагов до конца смены
  - balance: Антаг-кошельки получают стартовый аванс, а после долгой тишины при дефиците
      антагов гарантия может купить гост-роль - первая инжекция приходит раньше
  - admin: 'Панель директора: строка "почему сейчас так", графики динамики раунда
      за час, копилки с целью и сроком, понятные подписи причин отсева'
  - admin: Форс антаг-события или рулсета поверх заполненной антаг-цели предупреждает
      админа и называет текущих держателей нагрузки
