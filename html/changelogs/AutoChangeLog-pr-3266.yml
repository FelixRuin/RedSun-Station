author: DuLL-FoX
delete-after: true
changes:
  - bugfix: сутурки, бинты, пластыри, медспрей и гипоспрей снова работают через обычную
      одежду - раздеваться надо только если поверх скафандр или броня
  - bugfix: антаг-ручка, укусы кровососа и lewd_bite, обезьяньи укусы, террор-пауки
      и headcrab снова работают через одежду
  - balance: обычный шприц по-прежнему не уколет через одежду, weak-piercing пробивает
      обычную одежду, алмазный - всё (баланс шприцов сохраняется)
  - code_imp: проверка одежды для шприцов вынесена в отдельный proc can_inject_syringe(),
      чтобы случайно не зацепить всех caller'ов can_inject()
